<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shortly — URL Shortener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
            padding: 2.5rem;
            width: 100%;
            max-width: 480px;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .subtitle {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            display: flex;
            gap: 0.5rem;
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus { border-color: #3b82f6; }

        button {
            padding: 0.75rem 1.25rem;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }

        button:hover { background: #2563eb; }
        button:disabled { background: #93c5fd; cursor: not-allowed; }

        .result {
            margin-top: 1.25rem;
            padding: 1rem;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 8px;
            display: none;
        }

        .result.visible { display: block; }

        .result-label {
            font-size: 0.8rem;
            color: #666;
            margin-bottom: 0.5rem;
        }

        .result-url {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .result-url a {
            font-family: 'Courier New', monospace;
            font-size: 1rem;
            color: #1d4ed8;
            text-decoration: none;
            word-break: break-all;
        }

        .copy-btn {
            padding: 0.4rem 0.75rem;
            font-size: 0.8rem;
            background: #e5e7eb;
            color: #374151;
            flex-shrink: 0;
        }

        .copy-btn:hover { background: #d1d5db; }

        .error {
            margin-top: 1.25rem;
            padding: 1rem;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 8px;
            color: #dc2626;
            font-size: 0.9rem;
            display: none;
        }

        .error.visible { display: block; }

        nav {
            margin-top: 1.5rem;
            text-align: center;
        }

        nav a {
            color: #3b82f6;
            text-decoration: none;
            font-size: 0.85rem;
        }

        nav a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Shortly</h1>
        <p class="subtitle">Paste a long URL to get a short link</p>
        <form id="shorten-form">
            <div class="input-group">
                <input type="url" id="url-input" placeholder="https://example.com/very/long/url" required>
                <button type="submit" id="submit-btn">Shorten</button>
            </div>
        </form>
        <div class="result" id="result">
            <div class="result-label">Your short URL</div>
            <div class="result-url">
                <a id="short-url" href="#" target="_blank"></a>
                <button class="copy-btn" id="copy-btn">Copy</button>
            </div>
        </div>
        <div class="error" id="error"></div>
        <nav><a href="/analytics">View Analytics</a></nav>
    </div>

    <script>
        const form = document.getElementById('shorten-form');
        const input = document.getElementById('url-input');
        const submitBtn = document.getElementById('submit-btn');
        const result = document.getElementById('result');
        const shortUrl = document.getElementById('short-url');
        const copyBtn = document.getElementById('copy-btn');
        const error = document.getElementById('error');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            result.classList.remove('visible');
            error.classList.remove('visible');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Shortening...';

            try {
                const res = await fetch('/api/shorten', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: input.value }),
                });
                const data = await res.json();

                if (!res.ok) {
                    error.textContent = data.error || 'Something went wrong';
                    error.classList.add('visible');
                    return;
                }

                shortUrl.href = data.short_url;
                shortUrl.textContent = data.short_url;
                result.classList.add('visible');
            } catch (err) {
                error.textContent = 'Network error — is the server running?';
                error.classList.add('visible');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Shorten';
            }
        });

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(shortUrl.textContent);
            copyBtn.textContent = 'Copied!';
            setTimeout(() => { copyBtn.textContent = 'Copy'; }, 1500);
        });
    </script>
</body>
</html>
